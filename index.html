<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>carla's song</title>
  <meta name="description" content="a letter that was never meant to be read. two songs that explain everything.">
  <meta property="og:title" content="carla's song">
  <meta property="og:description" content="a letter that was never meant to be read. two songs that explain everything. you don't need to know the story — you already know the feeling.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♪</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #fafaf9;
      color: #1a1a18;
      overflow: hidden;
    }

    .scene {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      position: relative;
    }

    /* ── subtle grain texture ── */
    .scene::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }

    /* ── record icon ── */
    .record {
      width: 52px; height: 52px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.2s;
    }
    .record-ring {
      animation: spin 8s linear infinite;
      transform-origin: center;
    }

    /* ── lines ── */
    .line-1, .line-2, .line-3 {
      opacity: 0;
      transform: translateY(10px);
    }
    .line-1 {
      font-size: clamp(15px, 4vw, 19px);
      color: #1a1a18;
      line-height: 1.6;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 0.7s;
    }
    .line-2 {
      font-size: clamp(15px, 4vw, 19px);
      color: #1a1a18;
      line-height: 1.6;
      margin-bottom: 0.5rem;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 1.2s;
    }
    .line-3 {
      font-size: clamp(13px, 3.5vw, 16px);
      color: #888780;
      line-height: 1.7;
      margin-bottom: 3rem;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 1.8s;
    }

    /* ── enter button ── */
    .enter-wrap {
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
      animation-delay: 2.6s;
    }
    .enter-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #888780;
      background: none;
      border: 0.5px solid #d3d1c7;
      border-radius: 24px;
      padding: 10px 22px;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .enter-btn:hover {
      background: #1a1a18;
      color: #fafaf9;
      border-color: #1a1a18;
    }
    .enter-btn svg { transition: transform 0.2s; }
    .enter-btn:hover svg { transform: translateX(3px); }

    /* ── skip hint ── */
    .skip-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #d3d1c7;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
      animation-delay: 3.2s;
      white-space: nowrap;
      z-index: 1;
    }

    /* ── footer ── */
    .welcome-footer {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 11px;
      color: #d3d1c7;
      opacity: 0;
      animation: fadeIn 0.5s ease forwards;
      animation-delay: 3s;
      z-index: 1;
    }

    /* ── page fade out ── */
    body.leaving {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #1a1a18; color: #f1efe8; }
      .line-1, .line-2 { color: #f1efe8; }
      .line-3 { color: #5f5e5a; }
      .enter-btn { border-color: #444441; color: #888780; }
      .enter-btn:hover { background: #f1efe8; color: #1a1a18; border-color: #f1efe8; }
      .skip-hint { color: #444441; }
      .welcome-footer { color: #444441; }
    }
  </style>
</head>
<body>
<div class="scene">
  <div class="content">

    <!-- record / disc icon -->
    <svg class="record" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="26" cy="26" r="25" stroke="#e0ddd6" stroke-width="1"/>
      <g class="record-ring">
        <circle cx="26" cy="26" r="18" stroke="#e0ddd6" stroke-width="0.5" stroke-dasharray="3 4"/>
        <circle cx="26" cy="26" r="11" stroke="#e0ddd6" stroke-width="0.5" stroke-dasharray="2 3"/>
      </g>
      <circle cx="26" cy="26" r="3.5" fill="#888780"/>
    </svg>

    <p class="line-1">a letter that was never meant to be read.</p>
    <p class="line-2">two songs that explain everything.</p>
    <p class="line-3">you don't need to know the story —<br>you already know the feeling.</p>

    <div class="enter-wrap">
      <a href="journal.html" class="enter-btn" onclick="enter(event)">
        read it
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

  </div>
</div>

<div class="skip-hint">tap anywhere to enter</div>
<div class="welcome-footer">april 2026</div>

<script>
  function enter(e) {
    if (e) e.preventDefault();
    document.body.classList.add("leaving");
    setTimeout(function(){ window.location.href = "journal.html?autoplay=1"; }, 380);
  }

  // tap anywhere after animations settle
  var canSkip = false;
  setTimeout(function(){ canSkip = true; }, 1200);

  document.addEventListener("click", function(e) {
    if (!canSkip) return;
    if (e.target.closest(".enter-btn")) return;
    enter();
  });
  document.addEventListener("touchstart", function(e) {
    if (!canSkip) return;
    if (e.target.closest(".enter-btn")) return;
    enter();
  }, { passive: true });

  // keyboard: press any key to enter
  document.addEventListener("keydown", function(e) {
    if (!canSkip) return;
    if (e.key === "Tab") return;
    enter();
  });
</script>
</body>
</html>
